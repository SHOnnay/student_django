{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Student Management System{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      header h1 {
        font-size: 2rem;
        color: #000;
        font-weight: 600;
        margin-bottom: 1rem;
      }
      .navbar {
        padding: 0.3rem 1rem;
      }
      .navbar-nav .nav-link {
        padding: 0.25rem 0.75rem;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <header class="text-center my-3">
      <h1>STUDENT MANAGEMENT SYSTEM</h1>
    </header>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-center"
          id="navbarNav"
        >
          <ul class="navbar-nav flex-wrap">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'home' %}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'student_list' %}">Students</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'teacher-list' %}">Teachers</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'subject-list' %}">Subjects</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'class-list' %}">Classes</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'designation_list' %}"
                >Designation</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'department_list' %}"
                >Department</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'department_list2' %}"
                >Department 2</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'staff_list_view' %}">Staff</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container-fluid mt-4">{% block content %}{% endblock %}</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
