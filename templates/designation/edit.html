{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Designation{% endblock %}

{% block content %}

<div class="container py-4">
    <div class="row">

        <!-- LEFT: EDIT FORM -->
        <div class="col-md-6">
            <div class="card shadow-sm p-4">
                <h2>Edit Designation</h2>

                <form id="editForm" method="POST">
                    {% csrf_token %}

                    <!-- NAME -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Designation Name</label>
                        <input type="text" id="name" name="name" class="form-control"
                               value="{{ designation.name }}">
                        <span class="text-danger small name_error"></span>
                    </div>

                    <!-- DEPARTMENT -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Department</label>
                        <select id="department" name="department" class="form-control">
                            {% for d in departments %}
                                <option value="{{ d.id }}"
                                    {% if d.id == designation.department_id %}selected{% endif %}>
                                    {{ d.name }}
                                </option>
                            {% endfor %}
                        </select>
                        <span class="text-danger small department_error"></span>
                    </div>

                    <!-- STATUS -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Status</label>
                        <select name="status" id="status" class="form-control">
                            <option value="1" {% if designation.status == 1 %}selected{% endif %}>Active</option>
                            <option value="0" {% if designation.status == 0 %}selected{% endif %}>Inactive</option>
                        </select>
                        <span class="text-danger small status_error"></span>
                    </div>

                    <!-- BUTTON -->
                    <div class="d-flex justify-content-center mt-3">
                        <button type="submit" id="updateDesignationBtn" class="btn btn-primary me-2 px-4">
                            💾 Update Designation
                        </button>
                        <a href="{% url 'designation_list' %}" class="btn btn-success px-4">
                            ⬅️ Back
                        </a>
                    </div>

                </form>
            </div>
        </div>

        <!-- RIGHT: TABLE -->
        <div class="col-md-6">
            <div class="table-responsive" style="max-height: 800px; overflow-y: auto;">
                <table class="table table-bordered table-striped table-hover table-sm" id="designationTable">
                    <thead class="table-dark" style="position: sticky; top: 0; z-index: 2;">
                        <tr>
                            <th>#</th>
                            <th>Id</th>
                            <th>Name</th>
                            <th>Department</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="designationTableBody">
                        <!-- AJAX LOAD -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

{% endblock %}

{% block extra_js %}
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="{% static 'js/save_csrftoken.js' %}"></script>
<script src="{% static 'js/designation_update.js' %}"></script>
<script src="{% static 'js/designation_load.js' %}"></script>
{% endblock %}
